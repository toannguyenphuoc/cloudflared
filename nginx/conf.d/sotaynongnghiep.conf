server {
    listen 80;
    server_name stnn.congnghetintien.vn;

    resolver 127.0.0.11 valid=30s;
    set $upstream stnn_web;

    location / {
        proxy_pass http://$upstream:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}


